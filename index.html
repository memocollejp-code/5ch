  </div>`;
}
function toggleNextThreadCandidates(threadId){
  const box = $('#nextThreadCandidates');
  if(!box) return;
  const isOpen = box.style.display !== 'none';
  if(isOpen){ box.style.display = 'none'; return; }
  if(box.dataset.loaded !== '1'){

      : `<div class="next-thread-empty">次スレ候補が見つかりませんでした</div>`;
    box.dataset.loaded = '1';
  }

}

/* =========================================================================
   v3.1.0バグ修正: おーぷん2chの bbs.cgi は送信データが Shift_JIS でないと
   100%エラーになる仕様のため、v3.0.0の URLSearchParams（UTF-8固定）送信は
   常に失敗していた。

   ブラウザ標準の TextEncoder は UTF-8 専用で Shift_JIS へのエンコードができず、
   JIS X 0208 の全文字（漢字含む数千字）を自前でテーブル化するのは非現実的な上、
   1文字でも変換を誤ると実際の公開スレに文字化けした投稿をしてしまう危険がある。

   そこで「ブラウザ自身が持つ正しいShift_JISエンコーダー」を使う抜け道として、
   非表示の <form accept-charset="Shift_JIS"> を隠しiframeへ向けて送信するハックを
   採用する。フォームのクロスオリジン送信はCORSの制限を受けないため、これだけで
   CORS問題とShift_JIS問題の両方を同時に回避できる（＝文字コードの変換ミスが
   原理的に発生しない、ブラウザ純正の変換だけを使う）。

   トレードオフ: 送信先iframeの内容はクロスオリジンのため読み取れず、この場で
   成功/失敗を直接判定することはできない。そのため postMessage() 側では、
   送信後にいったんローカル擬似レスとして安全に表示しつつ、少し待ってから
   refreshThread() で最新datを取得し直す。実際に反映されていれば、上の
   pruneStaleLocalPosts()（本文一致マージ）が自動的にローカル分を片付ける。

   v3.2.0: おーぷん2ch側のCookie/トークンチェック等により、この隠しフォーム
   送信がサーバー側で弾かれるケースは残る。これは単一HTMLファイルのSPAという
   構成上の限界として受け入れ、送信ロジック自体はこのままとする。ユーザーへは
   「送信した」という事実と「未反映の場合はローカルに残る」という安全策を
   トースト文言で正しく伝えることを優先する（postMessage() 側で対応）。 */
function submitViaHiddenForm(t, name, body){
  return new Promise((resolve)=>{
    let done = false;
    const iframeName = 'sjisPostFrame_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    const iframe = document.createElement('iframe');
    iframe.name = iframeName;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = `https://${t.server}/test/bbs.cgi`;
    form.acceptCharset = 'Shift_JIS';
    form.target = iframeName;
    form.style.display = 'none';
    const fields = {
      bbs: t.boardKey,
      key: t.threadKey,
      time: String(Math.floor(Date.now()/1000)),
      FROM: name,
      mail: '',
      MESSAGE: body,
      submit: '書き込む',
    };
    Object.entries(fields).forEach(([k,v])=>{
      const inp = document.createElement('input');
      inp.type = 'hidden'; inp.name = k; inp.value = v;
      form.appendChild(inp);
    });
    document.body.appendChild(form);

    const finish = (ok)=>{
      if(done) return; done = true;
      setTimeout(()=>{ form.remove(); iframe.remove(); }, 50);
      resolve(ok);
    };
    iframe.addEventListener('load', ()=> finish(true), { once:true });
    /* loadイベントが発火しない環境（一部モバイルブラウザ等）向けの保険タイムアウト */
    setTimeout(()=> finish(true), 3000);

    /* v3.4.0バグ修正:「form.submit is not a function」クラッシュ対策
       fields に submit:'書き込む'（おーぷん2ch側が要求する送信ボタン名。
       サーバー仕様上この名前は変更できない）があるため、name="submit" の
       隠しinputがフォーム内に生成される。ブラウザのDOM仕様上、フォーム内に
       name="submit" の要素が存在すると、form.submit というプロパティ自体が
       そのinput要素に上書き（シャドーイング）され、本来のsubmit()メソッドを
       呼び出せなくなり100%クラッシュする（TypeError: form.submit is not a
       function）。
       そこで form.submit() ではなく、名前衝突の影響を受けない
       HTMLFormElement.prototype.submit を call() で直接呼び出す形に修正する。
       こちらはプロトタイプチェーンを直接叩くため、name="submit" の
       シャドーイングが起きていても常に安全に動作する。 */
    try{ HTMLFormElement.prototype.submit.call(form); }
    catch(err){ finish(false); }
  });
}
/* 戻り値: true = Shift_JISで送信自体は完了（成否はrefreshThreadで間接確認）
           false = フォーム構築・送信そのものに失敗（即ローカルへフォールバック） */
async function submitToOpen2ch(t, name, body){
  try{
    return await submitViaHiddenForm(t, name, body);
  }catch(err){
    return false;
  }
}
/* v3.4.0: プロアクティブ・デバッグ対応
   1) 送信中の連打による同一スレへの二重投稿を防ぐロック（スレ単位で管理するため、
      投稿確認中でも別スレへの新規投稿は妨げない）。
   2) 隠しform送信は応答確認に最大3秒、その後の反映確認にも数秒かかる。この間に
      ユーザーが別スレ・別画面へ移動する「非同期処理の競合」に備え、投稿対象の
      threadId をこの時点でスナップショットし、以後は STATE.threadId を直接
      参照しない。これにより、移動後に届いた結果が誤って「今見ている別のスレ」
      に書き込まれたり、今見ている別スレの入力欄を誤って消してしまう事故を防ぐ。 */
const postingThreadIds = new Set();
async function postMessage(){
  const threadId = STATE.threadId;
  if(!threadId) return;
  if(postingThreadIds.has(threadId)){ toast('送信中です。少々お待ちください'); return; }
  /* v3.5.0: 「1000レス終了（DAT落ち）」防御 - ボタン非表示/disabledによるUI制御をすり抜けて
     呼ばれても、ここで確実に書き込みを止める（多重の安全策） */
  if(totalRes(threadId) >= 1000){ toast('このスレッドは1000を超えています。新しいレスは書き込めません'); return; }
  const name = $('#cName').value.trim() || '名無しさん';
  const body = $('#cBody').value.trim();
  if(!body){ toast('本文を入力してください'); return; }
  const t = THREAD_INDEX[threadId];
  /* 投稿完了時点で、まだ同じスレを表示しているかどうかを確認するヘルパー。
     別画面/別スレに移動済みなら、入力欄のクリアや再描画は行わない。 */
  const isStillHere = ()=> STATE.view==='res' && STATE.threadId===threadId;

  postingThreadIds.add(threadId);
  if(isStillHere()){
    const btn = document.querySelector('[data-act="compose-post"]');
    if(btn) btn.disabled = true;
  }
  try{

  if(t && t.live){
    /* v3.1.0: 実データスレはShift_JIS対応の隠しform経由で本物のおーぷん2chへ送信を試みる */
    showLoading();
    let sent = false;
    try{ sent = await submitToOpen2ch(t, name, body); }
    catch(err){ sent = false; }
    hideLoading();
    if(sent){
      /* v3.1.0バグ修正: 応答を直接確認できないため、まずローカルにも安全策として
         即時表示しておく（＝書き込み内容が絶対に失われない）。実際にサーバーへ
         反映されていれば、この後のバックグラウンド確認で本文一致マージが
         自動的にローカルの重複表示を片付けてくれる。 */
      const num = totalRes(threadId) + 1;
      const post = { num, name, date:formatDate(Date.now()), id:'ID:local', body, ts:Date.now() };
      addLocalPost(threadId, post);
      if(persist.draft && persist.draft[threadId]){ delete persist.draft[threadId]; savePersist(); }
      if(isStillHere()){
        $('#cName').value=''; $('#cBody').value='';
        $('#composeBar').classList.remove('expanded');
        renderRes($('#main'));
      }
      toast('おーぷん2chへ送信しました（未反映時はローカルに保持されます）');
      /* v3.4.0: refreshThread()（現在表示中のスレを対象にする関数）ではなく、
         必ず「投稿した本来のスレ」を対象にする専用関数でバックグラウンド確認する。
         ユーザーが既に別スレへ移動していても、確認先を絶対に取り違えない。 */
      setTimeout(()=>{ silentlyReconcileAfterPost(threadId); }, 4000);
      return;
    }
    toast('実書き込みの送信に失敗したため、ローカルにのみ保存しました');
  }

  /* ダミースレ、または実送信そのものに失敗した場合のフォールバック（ローカル擬似書き込み） */
  const num = totalRes(threadId) + 1;
  const post = { num, name, date:formatDate(Date.now()), id:'ID:local', body, ts:Date.now() };
  addLocalPost(threadId, post);
  /* v2.3.0: 投稿が完了したら下書きを破棄する */
  if(persist.draft && persist.draft[threadId]){ delete persist.draft[threadId]; savePersist(); }
  if(isStillHere()){
    $('#cName').value=''; $('#cBody').value='';
    $('#composeBar').classList.remove('expanded');
    renderRes($('#main'));
  }
  toast('書き込みました（ローカルのみ）');

  } finally {
    postingThreadIds.delete(threadId);
    if(isStillHere()){
      const btn = document.querySelector('[data-act="compose-post"]');
      if(btn) btn.disabled = false;
    }
  }
}
/* v3.4.0: 投稿後のバックグラウンド確認専用（silentlyの意味は「勝手に画面へ
   割り込まない」）。指定した threadId のデータだけを静かに再取得し、
   ユーザーがまだそのスレを見ている場合に限り画面を最新化する。
   確認に失敗しても、それはユーザー操作によるエラーではないため、
   トーストもエラー表示も出さずに静かに諦める（ensureLivePostsのsilent引数）。 */
async function silentlyReconcileAfterPost(threadId){
  try{ await ensureLivePosts(threadId, true, true); }
  catch(err){ /* バックグラウンド確認なので失敗しても静かに諦める */ }
  if(STATE.view==='res' && STATE.threadId===threadId){
    renderRes($('#main'));
  }
}
function renderRes(main){
  const t = THREAD_INDEX[STATE.threadId];
  if(!t){ main.innerHTML='<div class="empty">スレッドが見つかりません</div>'; return; }

  /* v2.4.0: 実データ(live)スレは、通信が完了して LIVE_POSTS にデータが
     格納されるまで、メイン画面には一切レスを描画しない（ダミーデータのチラ見え防止）。
     ローディング中はローディングインジケーターのみを表示して待機する。 */
  if(t.live && !LIVE_POSTS[STATE.threadId]){
    /* v2.10.0バグ修正: 通信失敗時（t.error）は「レスがありません」と誤解させる
       空スレ表示ではなく、専用のエラーUIと再読み込みボタンを表示する。 */
    if(t.error){
      main.innerHTML = `<div class="empty">
        <div style="font-size:32px; margin-bottom:8px;">⚠️</div>
        <div style="margin-bottom:14px;">データの取得に失敗しました<br>通信環境をご確認ください</div>
        <button class="btn primary" data-act="thread-retry" style="flex:0 0 auto; padding:10px 22px;">🔄 再読み込み</button>
      </div>`;
    } else {
      main.innerHTML = `<div class="empty">
        <div class="loading-spinner" style="margin:0 auto 14px;"></div>
        読み込み中...
      </div>`;
    }
    $('#composeBar').classList.remove('show'); $('#main').classList.remove('has-compose');
    return;
  }

  const posts = getPosts(STATE.threadId);
  const read = getReadCount(STATE.threadId);
  const newCount = Math.max(0, posts.length-read);

  addHistory(STATE.threadId);
  savePersist();
  
  const replyMap = buildReplyMap(posts);
  /* v2.6.0: Chmate風「IDの発言回数に応じた色付け」- スレ内でのID出現数を先に集計しておく */
  const idCounts = {};
  posts.forEach(p=>{ if(p.id) idCounts[p.id] = (idCounts[p.id]||0)+1; });
  /* v2.8.0: スレ主（>>1）と同一IDのレスすべてに【主】バッジを付与するため、先にOPのIDを取得しておく */
  const opId = computeOpId(posts);
  /* v4.0.0: 「【主】のみ」抽出表示モード。
     opIdが未確定（実データ未着など）の間はフィルタを適用せず全レス表示にフォールバックすることで、
     エラーやクラッシュ、画面が真っ白になる事故を防ぐ。ユーザーがONにした意図(nushiOnlyWanted)自体は
     保持し続けるため、直後の再描画（通信完了後など）でopIdが確定次第、自動的にフィルタが効き始める。
     v4.1.0バグ修正: 以前はスレ主以外のレスをposts配列の時点でfilter()して物理的にDOMから
     除外していたが、これだと.postのDOM要素自体が存在しないため、jumpToPost()経由の
     アンカージャンプ（>>N タップ→該当レスへスクロール）が100%失敗する欠陥があった。
     必ず「全レス」をループしてDOM要素そのものは常に生成した上で、スレ主以外のレスには
     `.nushi-hidden`クラスだけを付けて画面上隠す設計に変更する。これにより、ジャンプ先の
     要素は常にDOM上に存在し続け、jumpToPost側で必要な時だけ隠しクラスを解除できる。 */
  const nushiOnlyWanted = !!nushiOnlyByThread[STATE.threadId];
  const nushiOnly = nushiOnlyWanted && !!opId;
  const nushiBtn = document.querySelector('[data-act="nushi-toggle"]');
  if(nushiBtn) nushiBtn.classList.toggle('on', nushiOnlyWanted);
  let html='';
  let dividerShown=false;
  let visibleCount=0;
  posts.forEach((p)=>{
    /* v3.0.0バグ修正: idx+1 ではなく、投稿が本来持つ p.num を表示に使う。
       ローカル書き込み後にサーバーの実データが増えても番号がスライドしないようにする */
    const num=p.num;
    if(!dividerShown && num>read && newCount>0){
      html+=`<div class="new-divider flash"><span>未読レス ${newCount}件</span></div>`;
      dividerShown=true;
    }
    const isMine = p.id==='ID:local';
    const isNgId = !!(p.id && persist.ngIds.includes(p.id));
    /* v3.6.0: NG-IDに該当しないレスだけ、本文NGワード/正規表現との照合を行う
       （IDで既にNG判定が付いている場合は本文チェックをスキップしてループ負荷を減らす） */
    const isNgWord = !isNgId && isBodyNgMatched(p.body);
    const isNg = isNgId || isNgWord;
    /* v4.1.0: スレ主のみ表示ONの時、スレ主以外のレスに付与する非表示クラス。
       DOM要素自体は必ず生成されるため、jumpToPost()側で解除すればいつでも表示できる。 */
    const isNushiHidden = nushiOnly && p.id!==opId;
    if(!isNushiHidden) visibleCount++;
    const nushiHiddenClass = isNushiHidden ? ' nushi-hidden' : '';
    let pidHtml = '';
    if(p.id){
      const idCnt = idCounts[p.id] || 0;
      /* 1〜2回:通常色 / 3〜4回:注意色 / 5回以上:激しく書き込んでいるIDとして赤字太字 */
      const pidClass = idCnt>=5 ? ' pid-hot' : (idCnt>=3 ? ' pid-warn' : '');
      const countHtml = idCnt>=2 ? `<span class="id-count">(${idCnt})</span>` : '';
      pidHtml = `<span class="pid${pidClass}" data-id="${esc(p.id)}">${esc(p.id)}</span>${countHtml}`;
    }
    /* v2.8.0: スレ主バッジ（>>1のIDと一致するレス全てに付与） */
    const nushiHtml = (opId && p.id===opId) ? `<span class="badge-nushi">【主】</span>` : '';
    const headHtml = `<div class="post-head">
        <span class="pnum">${num}</span>
        <span class="pname">${esc(p.name)}</span>
        <span class="pmeta">${esc(p.date)}</span>
        ${pidHtml}${nushiHtml}
      </div>`;
    if(isNg){
      /* v2.4.0: NG登録済みのIDのレスは本文を隠して省略表示する
         v3.6.0: NGワード/正規表現にマッチした場合もラベルを分けて同様に隠す */
      const ngLabel = isNgId ? 'あぼーん（NG-ID）' : 'あぼーん（NGワード）';
      html+=`<div class="post ng${nushiHiddenClass}" data-num="${num}">
        ${headHtml}
        <div class="post-body ng-body"><span class="ng-label">${ngLabel}</span></div>
      </div>`;
      return;
    }
    const images = extractImageUrls(p.body);
    let thumbHtml='';
    if(images.length){
      thumbHtml = `<div class="post-thumb-wrap">` + images.map(url=>
        `<img class="post-thumb" src="${esc(url)}" data-full="${esc(url)}" loading="lazy" alt="添付画像">`
      ).join('') + `</div>`;
    }
    const replies = replyMap[num];
    const replyHtml = (replies && replies.length)
      ? `<span class="reply-badge" data-replies="${num}">${replies.length}件の返信</span>`
      : '';
    html+=`<div class="post ${isMine?'own':''}${nushiHiddenClass}" data-num="${num}">
      ${headHtml}
      <div class="post-body">${linkifyBody(p.body)}</div>
      ${thumbHtml}
      ${replyHtml}
    </div>`;
  });
  if(!html) html=`<div class="empty">レスがありません</div>`;
  /* v4.1.0: フィルタ方式をCSS非表示に変えたことで、上のhtmlは常に非空になる
     （非表示レスのdivもDOM上には存在するため）。スレ主のレスが1件もない場合の
     案内は、可視件数(visibleCount)を別途見て判定する。 */
  else if(nushiOnly && visibleCount===0){
    html = `<div class="empty">スレ主のレスがありません</div>` + html;
  }
  /* v2.8.0: スレ最下部に次スレ候補検索ボタンを設置（タップするまで候補は非表示） */
  html += renderNextThreadSection(STATE.threadId);
  main.innerHTML=html;
  /* v4.2.0: v4.1.0では「【主】のみ」表示ON中に既読カウントの更新自体をスキップしていたが、
     このアプリにはスレッドごとの既読スクロール位置の自動復元(scrollPositions)が既に
     完備されているため、表示モードに関わらず一律で既読を進めても「見ていないのに
     既読扱いになる」体験上の不都合は生じない。むしろスキップし続けると、スレ主の
     レスを最後まで読んでも一覧の未読バッジが減らないという逆に不便な状態になっていた。
     表示モードのON/OFFに関わらず、常に一律でsetReadCount()を実行する仕様に統一する。 */
  setReadCount(STATE.threadId, posts.length);
  /* v3.5.0: 「1000レス終了（DAT落ち）」制御。総レス数が1000以上のスレは、
     書き込みフォームを隠して代わりに案内メッセージを表示する。 */
  const isDatOchi = posts.length >= 1000;
  $('#composeBar').classList.add('show'); $('#main').classList.add('has-compose');
  $('#composeBar').classList.toggle('datochi', isDatOchi);
  /* v2.3.0: 保存されていた下書きを書き込みフォームへ自動復元 */
  const draft = (persist.draft && persist.draft[STATE.threadId]) || {};
  $('#cName').value = draft.name || '';
  $('#cBody').value = draft.body || '';
  /* v3.4.0: 「書き込む」ボタンの押下可否は、今表示しているスレが現在投稿処理中か
     どうかに合わせて毎回同期する。これにより、別スレへ移動しても押せない状態が
     誤って引き継がれたり、逆に投稿中のスレへ戻った際に押せてしまったりしない。 */
  const postBtn = document.querySelector('[data-act="compose-post"]');
  if(postBtn) postBtn.disabled = postingThreadIds.has(STATE.threadId) || isDatOchi;
  /* v3.5.0: 実データの描画が完了したこのタイミングで、保存済みの既読スクロール位置を復元する
     （早期returnするローディング/エラー分岐は通らないため、データ未着時の位置ズレを避けられる） */
  restoreScrollPositionIfPending(STATE.threadId, main);
}
function scrollThreadTop(){ $('#main').scrollTop=0; }
function scrollThreadBottom(){ const m=$('#main'); m.scrollTop=m.scrollHeight; }
/* v3.7.0: 更新ボタン用の「なめらかスクロール」版。fab-navの▼ボタン（即座にジャンプ）とは
   役割が違うため、既存のscrollThreadBottom()には手を加えず別関数として追加する。 */
function smoothScrollThreadBottom(){
  const m = $('#main');
  if(!m) return;
  try{ m.scrollTo({top:m.scrollHeight, behavior:'smooth'}); }
  catch(e){ m.scrollTop = m.scrollHeight; /* smooth未対応環境向けフォールバック */ }
}

/* ---------- v3.7.0: スレ更新時の「新着レス通知」バッジ ---------- */
/* 通知バッジは #app 直下の固定要素として常に1つだけ存在し、表示中のスレッドIDを
   newArrivalNoticeThreadId に保持する。renderView() 側で「今見ている画面/スレッドと
   食い違ったら消す」ガードを入れているため、別スレへ移動した後に前のスレの通知が
   誤って残ることはない。 */
let newArrivalNoticeThreadId = null;
function showNewArrivalNotice(threadId, count){
  const el = $('#newArrivalNotice');
  if(!el || count<=0) return;
  newArrivalNoticeThreadId = threadId;
  el.textContent = `▼ 下に${count}件の新着レス`;
  el.classList.add('show');
}
function hideNewArrivalNotice(){
  newArrivalNoticeThreadId = null;
  const el = $('#newArrivalNotice');
  if(el) el.classList.remove('show');
}
/* 通知バッジのタップ操作：最下部までなめらかにスクロールする。
   通知を消すタイミングは、この後の#mainスクロールイベント側で「最下部付近に到達したか」を
   見て自動判定するため、ここで即座に消す必要はない（手動スクロールで消える処理と共通化できる）。 */
function jumpToBottomFromNotice(){
  smoothScrollThreadBottom();
}
async function refreshThread(){
  const targetThreadId = STATE.threadId;
  if(!targetThreadId) return;
  /* v3.8.0: 新着レス数の計算は、ローカル投稿（ID:local）に惑わされない
     「純粋なサーバー側の実データ件数」の差分を基準にする。
     更新前に LIVE_POSTS か GEN_CACHE から直接長さを取得し、スナップショットする。
     これにより、通信後にローカル投稿がマージされて消去されても、新着件数の計算がズレない。 */
  const prevLiveCount = LIVE_POSTS[targetThreadId]?.length || (GEN_CACHE[targetThreadId]?.length || 0);
  /* 前回の更新で出したままの通知が残っていれば、いったんクリアしてから今回の結果で判定し直す */
  if(newArrivalNoticeThreadId===targetThreadId) hideNewArrivalNotice();
  await ensureLivePosts(targetThreadId, true);
  /* v3.7.0: 通信中に別スレ・別画面へ移動している可能性があるため、renderRes()は
     「今実際に表示すべき画面」を描くための呼び出しとして現在のSTATEに委ねる
     （renderRes自身が常にSTATE.threadIdを参照して描画するため、ここでは呼ぶだけでよい） */
  renderRes($('#main'));
  /* v2.10.0: 通信失敗時は ensureLivePosts 側で既にエラートーストが出るため、
     ここで重ねて「更新しました」と出して誤解させないようにする */
  const t = THREAD_INDEX[targetThreadId];
  if(!t || !t.error) toast('更新しました');
  /* v3.7.0 / v3.8.0: 新着レス通知。まだ更新対象と同じスレ・res画面を見ている場合に限り表示する
     （更新中に別スレへ移動していた場合、無関係なスレに誤って通知が浮き出るのを防ぐ）
     v3.8.0: 新着件数はローカル投稿に惑わされない純粋なLIVE_POSTSベースで計算する */
  if(STATE.view==='res' && STATE.threadId===targetThreadId){
    const newLiveCount = LIVE_POSTS[targetThreadId]?.length || 0;
    const newCount = Math.max(0, newLiveCount - prevLiveCount);
    if(newCount>0) showNewArrivalNotice(targetThreadId, newCount);
  }
}

function jumpToPost(num){
  /* v4.5.0バグ修正: 多層ポップアップが3重・4重に積まれている状態でジャンプすると、
     closeTopPopup()を1回呼ぶだけでは最前面の1枚しか閉じず、残りのポップアップが
     画面に残ったままフリーズしたように見えるバグがあった。ジャンプ実行時は
     スタックに残っている分を問答無用で全て閉じ切り、#scrim/#popupLayerの
     showクラスも完全に外れたクリーンな状態にしてから対象レスへ進む。 */
  closeAllPopups();
  const post=$(`[data-num="${num}"]`);
  if(!post){ toast('該当レスが見つかりません'); return; }
  if(post.classList.contains('nushi-hidden')){
    /* v4.2.0バグ修正: v4.1.0では対象レス単体だけ.nushi-hiddenを解除していたが、
       これだと前後のレス（他人のレス）は隠されたままなので、ジャンプ先のレスだけが
       文脈から切り離された「孤立状態」で表示されてしまっていた。
       ジャンプ対象がスレ主以外の隠しレスだった場合は、そのスレッドの「【主】のみ」
       表示モード自体を自動でOFFにし、全レス通常表示へ戻してから改めてジャンプする。 */
    const tid = STATE.threadId;
    if(tid) nushiOnlyByThread[tid] = false;
    /* renderRes()はmain.innerHTMLを丸ごと差し替えるため、上で取得したpost要素は
       この時点でDOMツリーから切り離された古い参照になる。再描画後に同じdata-numを
       持つ要素を改めて取得し直す必要がある。
       また、innerHTML差し替え直後はレイアウト（scrollHeightなど）が完全には確定して
       いないことがあるため、requestAnimationFrameで1フレーム分レイアウトの確定を
       待ってからscrollIntoViewを実行し、モード切替の再描画とスクロールのタイミングが
       非同期に競合してジャンプ位置がズレる事故を防ぐ。 */
    renderRes($('#main'));
    toast('スレ主のみ表示を解除しました');
    requestAnimationFrame(()=>{
      const target = $(`[data-num="${num}"]`);
      if(target){
        target.classList.add('flash-jump');
        target.scrollIntoView({behavior:'smooth',block:'center'});
        setTimeout(()=>target.classList.remove('flash-jump'),1300);
      } else {
        toast('該当レスが見つかりません');
      }
    });
    return;
  }
  post.classList.add('flash-jump');
  post.scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(()=>post.classList.remove('flash-jump'),1300);
}

function submitNgManageAdd(popupEl){
  const input = popupEl ? popupEl.querySelector('#ngManageInput') : null;
  const val = input ? input.value.trim() : '';
  if(!val){ toast('内容を入力してください'); return; }
  if(ngManageTab==='id'){
    ngAdd(val);
    /* v3.7.0: 登録の成否に関わらず、直後のrefreshOpenPopups()でポップアップの中身自体は
       再構築されるが、それに頼らず明示的にここで空欄へ戻し、連続登録の操作感を良くする */
    if(input) input.value = '';
  } else {
    if(!Array.isArray(persist.ngWords)) persist.ngWords=[];
    /* 正規表現形式（/pattern/flags）として指定された場合は、登録前に必ずコンパイルを試して
       不正な指定を弾く。ここで防いでおくことで、後の描画時に毎回try-catchに頼らずに済む */
    const m = /^\/(.*)\/([a-z]*)$/i.exec(val);
    if(m){
      try{ new RegExp(m[1], m[2]); }
      catch(e){ toast('正規表現の形式が正しくありません'); return; }
    }
    if(persist.ngWords.includes(val)){ toast('既に登録されています'); return; }
    persist.ngWords.push(val);
    savePersist();
    invalidateNgWordMatchersCache();
    if(STATE.view==='res') renderRes($('#main'));
    toast('NGワードを登録しました');

    if(input) input.value = '';
  }
  refreshOpenPopups();
}

      restoreThreadCacheIntoIndex();

/* ---------- NG (あぼーん) ---------- */
/* v3.6.0: 本文（body）を対象としたNGワード/NG正規表現フィルタ。
   ・通常の文字列は部分一致として扱う。
   ・"/pattern/flags" のように / で囲まれた形式は正規表現として解釈する。
   ・不正な正規表現や実行時エラーはすべて try-catch で無視し、他の判定やアプリ全体を
     絶対にクラッシュさせない（1つの不正なNGワードのせいで全レスが表示できなくなる事故を防ぐ）。
   ・大容量スレ（最大1000レス）でループ負荷を抑えるため、正規表現のコンパイルは
     ワード追加/削除/インポート時にのみ行い、結果をキャッシュして再利用する
     （投稿1件ごとに毎回コンパイルし直すことはしない）。 */
let _ngWordMatchersCache = null;
function invalidateNgWordMatchersCache(){ _ngWordMatchersCache = null; }
function compileNgWordMatchers(){
  const list = Array.isArray(persist.ngWords) ? persist.ngWords : [];
  const matchers = [];
  list.forEach(raw=>{
    if(!raw) return;
    const m = /^\/(.*)\/([a-z]*)$/i.exec(raw);
    if(m){
      try{
        const re = new RegExp(m[1], m[2]);
        matchers.push(body=>re.test(body));
      }catch(e){ /* 不正な正規表現はこのワードだけスキップし、他のNGワード判定は継続する */ }
    } else {
      matchers.push(body=>body.indexOf(raw)>=0);
    }
  });
  return matchers;
}
function getNgWordMatchers(){
  if(_ngWordMatchersCache===null) _ngWordMatchersCache = compileNgWordMatchers();
  return _ngWordMatchersCache;
}
function isBodyNgMatched(body){
  const matchers = getNgWordMatchers();
  if(!matchers.length) return false;
  const text = String(body||'');
  for(let i=0;i<matchers.length;i++){
    try{ if(matchers[i](text)) return true; }
    catch(e){ /* 実行時エラーが出た場合もそのワードの判定だけ諦めて次に進む */ }
  }
  return false;
}
function ngAdd(id){
  if(!persist.ngIds.includes(id)){ persist.ngIds.push(id); savePersist(); }
  if(STATE.view==='res') renderRes($('#main'));
  refreshOpenPopups();
  toast(`${id} をNG登録しました`);
}
function ngRemove(id){
  const i=persist.ngIds.indexOf(id);
  if(i>=0){ persist.ngIds.splice(i,1); savePersist(); }
  if(STATE.view==='res') renderRes($('#main'));
  refreshOpenPopups();
  toast(`${id} のNGを解除しました`);
}

   1文字入力するたびに同期I/OのsavePersist()（localStorage.setItem）を実行するとプチフリの

let draftSaveTimer = null;

/* ---------- init ---------- */
async function init(){
  loadPersist();
  /* v4.4.0: STATE構築やnormalizeState()（resolveLiveThread経由でOPEN2CH_BOARDSを
     参照する）より前に、必ずカスタム板をBOARDS/OPEN2CH_BOARDSへ反映しておく。
     ここが後だと、起動直後にカスタム板のスレッドを開こうとした際に板情報が
     見つからずダミー扱いされてしまう。 */
  applyCustomBoards();
  /* v4.7.0バグ修正: 「お気に入りスレのタイトルが(読み込み中...)に化ける」問題の
     対策本体。OPEN2CH_BOARDS にカスタム板のマッピングが反映済み（＝上の
     applyCustomBoards()実行後）のこのタイミングで、persist.threadCacheの内容を
     THREAD_INDEXへ確実に復元する。resolveLiveThread()を使ってTHREAD_INDEXに
     まだ無い実データスレのプレースホルダを作ってからキャッシュを上書きするため、
     起動直後でも一覧画面が正しいタイトル・レス数で描画される。 */
  restoreThreadCacheIntoIndex();
  STATE={view:persist.nav.view||'boards', boardId:persist.nav.boardId||null, threadId:persist.nav.threadId||null};
  normalizeState();
  /* v3.5.0: アプリを閉じる/切り替える直前にスレッド画面のままだった場合、
     起動直後の再入場としてスクロール位置の復元対象に印を付ける */
  if(STATE.view==='res' && STATE.threadId) pendingScrollRestore[STATE.threadId] = true;
  /* v4.7.0: ensureShape()内でカスタム板IDの旧→新形式マイグレーションが実際に
     発生していた場合、STATE確定直後のこのタイミングでsavePersist()を呼び、
     クリーンアップ済みの状態をできるだけ早くlocalStorageへ書き戻す。
     これにより、アプリを何も操作せず即座に閉じたとしても、旧ID形式の生データが
     ストレージに残り続ける期間を最小化できる（savePersist()はSTATEを参照する
     ため、STATE確定より前には呼べないことに注意）。 */
  if(_customBoardIdMigrationOccurred){
    _customBoardIdMigrationOccurred = false;
    savePersist();
  }
  applyTheme();
  syncVersionTexts();
  history.replaceState(serialize(),'');
  /* v2.3.0: 起動時も先に画面を描画し、通信完了後に中身を更新する */
  renderView();
  showLoading();
  try{
    await prepareViewData();
  } finally {
    hideLoading();
  }
  renderView();
}
init();
</script>
</body>
</html>
